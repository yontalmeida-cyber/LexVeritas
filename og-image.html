<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px;
  background: #060608;
  font-family: Georgia, serif;
  overflow: hidden;
  position: relative;
}
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.06) 1px, transparent 1px);
  background-size: 60px 60px;
}
.glow {
  position: absolute;
  top: -100px; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 600px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.18) 0%, transparent 60%);
}
.gold-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #c9a84c, #e8c96a, #c9a84c);
}
.content {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 900px;
}
.eyebrow {
  font-family: monospace;
  font-size: 14px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: #c9a84c;
  margin-bottom: 24px;
}
.logo {
  font-size: 100px;
  color: #f8f6f1;
  font-style: italic;
  line-height: 1;
  margin-bottom: 24px;
}
.logo span { color: #c9a84c; }
.tagline {
  font-family: 'Arial', sans-serif;
  font-size: 22px;
  color: #9a9a9a;
  margin-bottom: 48px;
  line-height: 1.4;
}
.badges {
  display: flex;
  gap: 24px;
  justify-content: center;
}
.badge {
  border: 1px solid rgba(201,168,76,0.3);
  padding: 10px 24px;
  font-family: monospace;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: #9a9a9a;
}
.domain {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-family: monospace;
  font-size: 16px;
  letter-spacing: 0.3em;
  color: #c9a84c;
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow"></div>
<div class="gold-bar"></div>
<div class="content">
  <div class="eyebrow">Tecnologia Forense Jurídica · Portugal</div>
  <div class="logo">Lex<span>Veritas</span></div>
  <div class="tagline">O primeiro detector de IA em jurisprudência portuguesa<br>STJ · TRL · TRP · TRC · TRG · TRE · TC</div>
  <div class="badges">
    <div class="badge">6 INDICADORES FORENSES</div>
    <div class="badge">RELATÓRIO PDF</div>
    <div class="badge">9+ TRIBUNAIS</div>
  </div>
</div>
<div class="domain">lexveritas.pt</div>
</body>
</html>
