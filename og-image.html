<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: #060608;
  font-family: Georgia, serif;
  overflow: hidden;
  position: relative;
}

/* Grid background */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.06) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Gold glow */
.glow {
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 500px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.18) 0%, transparent 65%);
}

/* Left accent line */
.accent-left {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, transparent, #c9a84c, transparent);
}

/* Top bar */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #c9a84c, #e8c96a, #c9a84c);
}

/* Main content */
.content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 80px;
}

.eyebrow {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #c9a84c;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.eyebrow::after {
  content: '';
  display: block;
  width: 48px;
  height: 1px;
  background: #c9a84c;
  opacity: 0.5;
}

.logo {
  font-size: 96px;
  font-style: italic;
  color: #f8f6f1;
  line-height: 0.9;
  margin-bottom: 28px;
  letter-spacing: -0.02em;
}
.logo span { color: #c9a84c; }

.tagline {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  color: rgba(248,246,241,0.55);
  max-width: 560px;
  line-height: 1.5;
  font-style: normal;
  font-weight: 400;
  margin-bottom: 48px;
  letter-spacing: 0.01em;
}

/* Stats row */
.stats {
  display: flex;
  gap: 48px;
  align-items: center;
}
.stat { text-align: left; }
.stat-num {
  font-size: 36px;
  font-style: italic;
  color: #c9a84c;
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-lbl {
  font-family: 'Courier New', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(248,246,241,0.35);
}
.stat-divider {
  width: 1px;
  height: 40px;
  background: rgba(201,168,76,0.2);
}

/* Right panel */
.right-panel {
  position: absolute;
  right: 80px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: flex-end;
}

.badge {
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 8px 16px;
  border: 1px solid rgba(201,168,76,0.25);
  color: rgba(201,168,76,0.7);
  background: rgba(201,168,76,0.04);
}

/* Domain */
.domain {
  position: absolute;
  bottom: 40px;
  right: 80px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  letter-spacing: 0.15em;
  color: rgba(248,246,241,0.25);
  text-transform: lowercase;
}

/* Scales icon */
.scales {
  position: absolute;
  bottom: 32px;
  left: 80px;
  opacity: 0.12;
  font-size: 80px;
}
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="top-bar"></div>
  <div class="accent-left"></div>

  <div class="content">
    <div class="eyebrow">Tecnologia Forense Jurídica · Portugal</div>
    <div class="logo">Lex<span>Veritas</span></div>
    <div class="tagline">O primeiro sistema de análise forense de IA em decisões judiciais dos tribunais portugueses.</div>
    <div class="stats">
      <div class="stat">
        <span class="stat-num">14+</span>
        <span class="stat-lbl">Tribunais</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num">6</span>
        <span class="stat-lbl">Indicadores</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num">PDF</span>
        <span class="stat-lbl">Relatório</span>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="badge">STJ · TRL · TRP</div>
    <div class="badge">TRC · TRG · TRE</div>
    <div class="badge">TC · TCAS · TCAN</div>
    <div class="badge">EU AI Act Compliant</div>
  </div>

  <div class="scales">⚖</div>
  <div class="domain">lexveritas.pt</div>
</body>
</html>
