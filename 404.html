<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada — LexVeritas</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#060608">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%23060608'/><text y='48' x='8' font-size='48' font-family='Georgia' fill='%23c9a84c'>⚖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #060608; --white: #f8f6f1; --gold: #c9a84c; --gold-light: #e8c96a;
  --grey: #9a9a9a; --dark: #0e0e12; --border: rgba(201,168,76,0.15);
  --sans: 'Syne', sans-serif; --serif: 'Instrument Serif', Georgia, serif;
  --mono: 'JetBrains Mono', monospace;
}
body {
  background: var(--black);
  color: var(--white);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* Background */
.bg-glow {
  position: absolute;
  top: -20%; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 600px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.1) 0%, transparent 60%);
  pointer-events: none;
}
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* Nav */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 48px;
  background: rgba(6,6,8,0.9);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.nav-logo { font-family: var(--serif); font-size: 22px; color: var(--white); text-decoration: none; font-style: italic; }
.nav-logo span { color: var(--gold); }

/* Content */
.content {
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s ease forwards;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.error-code {
  font-family: var(--mono);
  font-size: 120px;
  font-weight: 300;
  color: rgba(201,168,76,0.08);
  line-height: 1;
  margin-bottom: 8px;
  letter-spacing: -0.04em;
}

.error-icon {
  font-size: 48px;
  margin-bottom: 24px;
  display: block;
  animation: tilt 3s ease-in-out infinite;
}
@keyframes tilt {
  0%, 100% { transform: rotate(-8deg); }
  50% { transform: rotate(8deg); }
}

.error-title {
  font-family: var(--serif);
  font-size: clamp(28px, 5vw, 48px);
  font-style: italic;
  margin-bottom: 16px;
  line-height: 1.1;
}
.error-title span { color: var(--gold); }

.error-sub {
  font-size: 14px;
  color: var(--grey);
  line-height: 1.7;
  max-width: 420px;
  margin: 0 auto 48px;
}

.error-actions {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary {
  background: var(--gold);
  color: var(--black);
  border: none;
  padding: 14px 36px;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.25s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.3); }

.btn-secondary {
  background: transparent;
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 14px 36px;
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.25s;
}
.btn-secondary:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-2px); }

.divider {
  width: 40px;
  height: 1px;
  background: var(--border);
  margin: 48px auto;
}

.links {
  display: flex;
  gap: 32px;
  justify-content: center;
  flex-wrap: wrap;
}
.links a {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--grey);
  text-decoration: none;
  transition: color 0.2s;
}
.links a:hover { color: var(--gold); }

@media (max-width: 600px) {
  nav { padding: 16px 24px; }
  .error-code { font-size: 80px; }
  .error-actions { flex-direction: column; align-items: center; }
  .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<nav>
  <a href="/" class="nav-logo">Lex<span>Veritas</span></a>
</nav>

<div class="content">
  <div class="error-code">404</div>
  <span class="error-icon">⚖️</span>
  <h1 class="error-title">Página <span>não encontrada</span></h1>
  <p class="error-sub">A página que procura não existe ou foi movida. Verifique o endereço ou regresse ao início.</p>

  <div class="error-actions">
    <a href="/" class="btn-primary">← Página Inicial</a>
    <a href="/app" class="btn-secondary">Ir para a Plataforma</a>
  </div>

  <div class="divider"></div>

  <div class="links">
    <a href="#problema" onclick="window.location='/'">O Problema</a>
    <a href="#como-funciona" onclick="window.location='/'">Como Funciona</a>
    <a href="#precos" onclick="window.location='/'">Preços</a>
    <a href="/privacidade">Privacidade</a>
    <a href="mailto:info@lexveritas.pt">Contacto</a>
  </div>
</div>

</body>
</html>
