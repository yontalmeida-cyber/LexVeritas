<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexVeritas — Em Manutenção</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#060608">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%23060608'/><text y='48' x='8' font-size='48' font-family='Georgia' fill='%23c9a84c'>⚖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #060608; --white: #f8f6f1; --gold: #c9a84c; --gold-light: #e8c96a;
  --grey: #9a9a9a; --dark: #0e0e12; --border: rgba(201,168,76,0.15);
  --sans: 'Syne', sans-serif; --serif: 'Instrument Serif', Georgia, serif;
  --mono: 'JetBrains Mono', monospace;
}
body {
  background: var(--black);
  color: var(--white);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.bg-glow {
  position: absolute;
  top: -20%; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 600px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.1) 0%, transparent 60%);
  pointer-events: none;
}
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}
.content {
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s ease forwards;
  max-width: 520px;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.logo {
  font-family: var(--serif);
  font-size: 32px;
  font-style: italic;
  margin-bottom: 40px;
  color: var(--white);
}
.logo span { color: var(--gold); }

.icon {
  font-size: 56px;
  margin-bottom: 24px;
  display: block;
  animation: spin 4s linear infinite;
}
@keyframes spin { 0%, 100% { transform: rotate(-15deg); } 50% { transform: rotate(15deg); } }

.title {
  font-family: var(--serif);
  font-size: clamp(28px, 5vw, 44px);
  font-style: italic;
  margin-bottom: 16px;
  line-height: 1.1;
}
.title span { color: var(--gold); }

.sub {
  font-size: 14px;
  color: var(--grey);
  line-height: 1.7;
  margin-bottom: 40px;
}

.eta-box {
  background: rgba(201,168,76,0.06);
  border: 1px solid var(--border);
  padding: 20px 28px;
  margin-bottom: 32px;
}
.eta-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  display: block;
  margin-bottom: 8px;
}
.eta-time {
  font-family: var(--serif);
  font-size: 24px;
  font-style: italic;
  color: var(--white);
}

.contact {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--grey);
  letter-spacing: 0.1em;
}
.contact a {
  color: var(--gold);
  text-decoration: none;
}
.contact a:hover { text-decoration: underline; }

.progress-bar {
  width: 100%;
  height: 2px;
  background: rgba(255,255,255,0.06);
  margin: 32px 0 16px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  animation: progress 3s ease-in-out infinite alternate;
}
@keyframes progress { from { width: 20%; } to { width: 85%; } }

@media (max-width: 480px) {
  .title { font-size: 28px; }
  .eta-time { font-size: 20px; }
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="top-bar"></div>

<div class="content">
  <div class="logo">Lex<span>Veritas</span></div>

  <span class="icon">⚙️</span>

  <h1 class="title">Em <span>manutenção</span></h1>
  <p class="sub">Estamos a realizar actualizações para melhorar a plataforma. Voltamos em breve com melhorias.</p>

  <div class="eta-box">
    <span class="eta-label">Tempo estimado de retorno</span>
    <div class="eta-time">Brevemente</div>
  </div>

  <div class="progress-bar"><div class="progress-fill"></div></div>

  <p class="contact">
    Questões urgentes: <a href="mailto:info@lexveritas.pt">info@lexveritas.pt</a>
  </p>
</div>
</body>
</html>
