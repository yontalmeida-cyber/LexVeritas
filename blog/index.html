<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Direito & Inteligência Artificial · LexVeritas</title>
<meta name="description" content="Análises e reflexões sobre inteligência artificial no sistema jurídico português. Para magistrados, advogados, docentes e investigadores.">
<link rel="canonical" href="https://lexveritas.pt/blog">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' fill='%23060608'/><text y='48' x='8' font-size='48' font-family='Georgia' fill='%23c9a84c'>⚖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --black:#060608;--dark:#0e0e12;--card:#13131a;
  --gold:#c9a84c;--gold-light:#e8c96a;
  --cream:#f8f6f1;--grey:#9a9a9a;
  --rule-dark:rgba(201,168,76,0.15);
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--cream);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px clamp(20px,5vw,60px);display:flex;align-items:center;justify-content:space-between;background:rgba(6,6,8,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--rule-dark)}
.nav-logo{font-family:var(--serif);font-size:20px;font-style:italic;color:var(--cream);text-decoration:none}
.nav-logo em{color:var(--gold)}
.nav-links{display:flex;align-items:center;gap:24px}
.nav-links a{font-family:var(--mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey);text-decoration:none;transition:color 0.2s}
.nav-links a:hover{color:var(--cream)}

/* CONTEÚDO */
.container{max-width:1200px;margin:120px auto 0;padding:0 clamp(20px,5vw,60px)}
.blog-header{margin-bottom:60px}
.blog-header h1{font-family:var(--serif);font-size:clamp(40px,8vw,80px);font-style:italic;line-height:1;margin-bottom:20px}
.blog-header p{font-family:var(--mono);font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:0.2em}

.posts-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:30px;margin-bottom:80px}
.post-card{background:var(--card);border:1px solid var(--rule-dark);padding:40px;display:flex;flex-direction:column;justify-content:space-between;transition:all 0.3s ease;text-decoration:none;color:inherit}
.post-card:hover{border-color:var(--gold);transform:translateY(-5px)}
.post-category{font-family:var(--mono);font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:20px}
.post-card h2{font-family:var(--serif);font-size:28px;font-style:italic;line-height:1.2;margin-bottom:15px;color:var(--cream)}
.post-card p{font-size:14px;color:var(--grey);line-height:1.6;margin-bottom:25px}
.post-link{font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:0.1em;font-weight:700}

footer{padding:40px clamp(20px,5vw,60px);border-top:1px solid var(--rule-dark);font-family:var(--mono);font-size:10px;color:var(--grey);display:flex;justify-content:space-between}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Lex<em>Veritas</em></a>
  <div class="nav-links">
    <a href="/">Início</a>
    <a href="/blog">Blog</a>
    <a href="/app">App</a>
  </div>
</nav>

<div class="container">
  <header class="blog-header">
    <p>Pensamento Crítico</p>
    <h1>Blog & <em>Reflexões</em></h1>
  </header>

  <div class="posts-grid">
    <a href="/blog/ia-tribunais-portugueses" class="post-card">
      <div>
        <div class="post-category">Justiça & Tecnologia</div>
        <h2>IA nos Tribunais Portugueses: O Que Está em Jogo</h2>
        <p>Uma análise sobre a integridade das decisões judiciais e o uso de algoritmos no sistema jurídico nacional.</p>
      </div>
      <span class="post-link">Ler Artigo →</span>
    </a>
  </div>
</div>

<footer>
  <span>© 2026 LexVeritas</span>
  <span>Portugal</span>
</footer>

</body>
</html>
