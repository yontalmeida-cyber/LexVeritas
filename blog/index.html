<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Direito & Inteligência Artificial · LexVeritas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --black:#060608;--dark:#0e0e12;--card:#13131a;
  --gold:#c9a84c;--cream:#f8f6f1;--grey:#9a9a9a;
  --rule-dark:rgba(201,168,76,0.15);
  --serif:'Instrument Serif',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
  --sans:'Syne',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--cream);font-family:var(--sans);min-height:100vh;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:25px 5%;display:flex;align-items:center;justify-content:space-between;background:rgba(6,6,8,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--rule-dark)}
.nav-logo{font-family:var(--serif);font-size:24px;font-style:italic;color:var(--cream);text-decoration:none}
.nav-logo em{color:var(--gold);font-style:italic;}

.container{max-width:1200px;margin:0 auto;padding:160px 5% 80px}
.blog-header{margin-bottom:80px}
.blog-header p{font-family:var(--mono);font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:0.3em;margin-bottom:15px}
.blog-header h1{font-family:var(--serif);font-size:clamp(50px,10vw,100px);line-height:0.9;font-weight:400}

.posts-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(350px, 1fr));gap:40px}
.post-card{background:var(--card);border:1px solid var(--rule-dark);padding:50px 40px;display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), border-color 0.4s ease}
.post-card:hover{border-color:var(--gold);transform:translateY(-10px)}
.post-category{font-family:var(--mono);font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:0.2em;margin-bottom:30px}
.post-card h2{font-family:var(--serif);font-size:36px;line-height:1.1;margin-bottom:20px;font-weight:400}
.post-card p{font-size:16px;color:var(--grey);line-height:1.6;margin-bottom:40px}
.post-link{font-family:var(--mono);font-size:11px;color:var(--gold);text-transform:uppercase;font-weight:700;letter-spacing:0.1em}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Lex<em>Veritas</em></a>
</nav>

<div class="container">
  <header class="blog-header">
    <p>Pensamento Crítico</p>
    <h1>Blog & Reflexões</h1>
  </header>

  <div class="posts-grid">
    <a href="/blog/ia-tribunais-portugueses" class="post-card">
      <div>
        <div class="post-category">Justiça & Tecnologia</div>
        <h2>IA nos Tribunais Portugueses: O Que Está em Jogo</h2>
        <p>Uma análise sobre a integridade das decisões judiciais e o uso de algoritmos no sistema jurídico nacional.</p>
      </div>
      <span class="post-link">Ler Artigo →</span>
    </a>
  </div>
</div>

</body>
</html>
